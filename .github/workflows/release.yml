name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag to publish. Defaults to v<package.json version>.
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: npm test -- --coverage

      - name: Read package metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          TAG=${{ github.event.inputs.tag }}

          if [ -z "$TAG" ]; then
            TAG="v$VERSION"
          fi

          if [ "$TAG" != "v$VERSION" ]; then
            echo "Input tag '$TAG' does not match package version 'v$VERSION'." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure version is not already published
        run: |
          if npm view "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} is already published." >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true